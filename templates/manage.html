{{define "content"}}
<div class="manage-grid">
    <div class="sidebar">
        <div class="manage-category">
            <h3>Add Category</h3>
            <form hx-post="/manage/category" hx-target="#category-list" hx-swap="innerHTML">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Layout</label>
                    <select name="layout">
                        <option value="tiles">Tiles</option>
                        <option value="list">List</option>
                        <option value="icons">Icons</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <select name="color">
                        <option value="indigo">Indigo</option>
                        <option value="red">Red</option>
                        <option value="green">Green</option>
                        <option value="yellow">Yellow</option>
                        <option value="blue">Blue</option>
                        <option value="purple">Purple</option>
                        <option value="gray">Gray</option>
                    </select>
                </div>
                <button type="submit">Create Category</button>
            </form>
        </div>

        <div class="manage-category">
            <h3>Add Service</h3>
            <form hx-post="/manage/service" hx-target="#category-list" hx-swap="innerHTML">
                <div class="form-group">
                    <label>Category</label>
                    <select name="category_id" required>
                        {{range .Categories}}
                        <option value="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" name="url" required>
                </div>
                <div class="form-group">
                    <label>Icon (emoji or text)</label>
                    <input type="text" name="icon">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description">
                </div>
                <div class="form-group">
                    <label>Status Check URL</label>
                    <input type="url" name="status_check">
                </div>
                <div class="form-group">
                    <label>Visibility</label>
                    <select name="visibility" multiple size="2">
                        <option value="markus" selected>Markus</option>
                        <option value="andrea" selected>Andrea</option>
                    </select>
                </div>
                <button type="submit">Add Service</button>
            </form>
        </div>

        <div class="manage-category">
            <h3>Add iCal Widget</h3>
            <form hx-post="/manage/widget" hx-swap="none" hx-on::after-request="this.reset()">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Abfallkalender" required>
                </div>
                <div class="form-group">
                    <label>iCal URL</label>
                    <input type="url" name="url" required>
                </div>
                <div class="form-group">
                    <label>Profil</label>
                    <select name="profile">
                        <option value="all">Alle</option>
                        <option value="markus">Nur Markus</option>
                        <option value="andrea">Nur Andrea</option>
                    </select>
                </div>
                <button type="submit">Widget hinzufügen</button>
            </form>
        </div>
    </div>

    <div id="category-list">
        {{template "category_list" .}}
    </div>
</div>
{{end}}
