<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeport – {{.T "login.title"}}</title>
    <link rel="stylesheet" href="/static/css/prism.css?v={{assetVer}}">
    <link rel="stylesheet" href="/static/style.css?v={{assetVer}}">
    <script src="/static/js/prism.js?v={{assetVer}}" defer></script>
</head>
<body data-bg="aurora">
    <div class="aurora" id="bg-aurora">
        <div class="ab ab-1"></div><div class="ab ab-2"></div><div class="ab ab-3"></div>
    </div>
    <div class="login-outer">
        <div class="login-inner">
            <div class="login-header">
                <div class="login-logo-icon">⚓</div>
                <h1 class="login-title">Homeport</h1>
            </div>
            <div class="glass-card login-card">
                {{if .RateLimited}}
                <div class="login-error">
                    {{.T "login.error.ratelimit"}}
                    {{if .RetryAfter}}<br><span class="login-retry-hint">{{.T "login.ratelimited.retry_prefix"}} {{.RetryAfter}} {{.T "login.ratelimited.retry_suffix"}}</span>{{end}}
                </div>
                {{else}}
                {{if .Error}}
                <div class="login-error">
                    {{.Error}}
                </div>
                {{end}}
                <form method="post" action="/login">
                    <div class="form-group">
                        <label>{{.T "login.profile"}}</label>
                        <select name="profile" required>
                            {{range .Profiles}}
                            <option value="{{.Slug}}">{{.Name}}</option>
                            {{end}}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>{{.T "login.password"}}</label>
                        <input type="password" name="password" required autofocus>
                    </div>
                    <button type="submit">{{.T "login.submit"}}</button>
                </form>
                {{end}}
            </div>
        </div>
    </div>
</body>
</html>
