{{define "profile_list"}}
<div class="profile-list">
  {{range .Profiles}}
  <div class="manage-service-item">
    <div class="service-info">
      <strong>{{.Name}}</strong>
      <span class="text-muted">/{{.Slug}}</span>
      {{if .IsDefault}}<span class="tag">Default</span>{{end}}
    </div>
    <div class="actions">
      <label title="Aurora-Farbe" style="display:flex;align-items:center;cursor:pointer;">
        <div class="profile-aurora-color" style="background:{{index $.ProfileColors .Slug}}"></div>
        <input type="color" value="{{index $.ProfileColors .Slug}}"
               data-profile="{{.Slug}}"
               class="profile-aurora-input"
               style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;">
      </label>
      {{if not .IsDefault}}
      <button class="btn-icon" title="{{$.T "manage.profile.set_default"}}"
        hx-post="/manage/profile/{{.Slug}}/default"
        hx-target="#profile-list" hx-swap="innerHTML">⭐</button>
      <button class="btn-icon delete" title="{{$.T "manage.delete"}}"
        hx-delete="/manage/profile/{{.Slug}}"
        hx-confirm="{{$.T "common.confirm_delete"}}"
        hx-target="#profile-list" hx-swap="innerHTML">🗑️</button>
      {{end}}
    </div>
  </div>
  {{end}}
</div>
{{end}}
