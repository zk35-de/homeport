{{define "widget_ical"}}
<div class="widget widget-ical">
  <h3 class="widget-title">{{.Name}}</h3>
  {{range .Events}}
  <div class="event {{if .IsToday}}today{{else if .IsTomorrow}}tomorrow{{end}}">
    <span class="event-date">{{.Start}}</span>
    <span class="event-title">{{.Title}}</span>
  </div>
  {{else}}
  <div class="event-empty">Keine Termine</div>
  {{end}}
</div>
{{end}}
