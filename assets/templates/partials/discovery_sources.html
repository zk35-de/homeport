{{define "discovery_sources"}}
<div id="discovery-sources-list">
  {{if not .Sources}}
    <p class="section-desc">Keine Quellen konfiguriert.</p>
  {{else}}
  <table class="data-table">
    <thead>
      <tr class="table-header-row">
        <th class="th-left">Name</th>
        <th class="th-left">Typ</th>
        <th class="th-left">URL</th>
        <th class="th-left">Intervall</th>
        <th class="th-left">Status</th>
        <th class="th-cell"></th>
      </tr>
    </thead>
    <tbody>
      {{range .Sources}}
      <tr class="table-row">
        <td class="td-cell">{{.Name}}</td>
        <td class="td-type">{{.Type}}</td>
        <td class="td-muted">{{.URL}}</td>
        <td class="td-muted-plain">{{.Interval}}s</td>
        <td class="td-cell">
          {{if .Enabled}}
            <span class="status-active">● aktiv</span>
          {{else}}
            <span class="status-paused">● pausiert</span>
          {{end}}
        </td>
        <td class="td-actions">
          <form hx-post="/manage/discovery/sources/{{.ID}}/toggle"
                hx-target="#discovery-sources-list" hx-swap="outerHTML">
            <button class="btn-sm" type="submit">
              {{if .Enabled}}Pause{{else}}Start{{end}}
            </button>
          </form>
          <form hx-delete="/manage/discovery/sources/{{.ID}}"
                hx-target="#discovery-sources-list" hx-swap="outerHTML"
                hx-confirm="Quelle '{{.Name}}' löschen?">
            <button class="btn-sm btn-danger" type="submit">Löschen</button>
          </form>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
  {{end}}
</div>
{{end}}
