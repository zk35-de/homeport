{{define "widget_todo"}}
<div class="widget widget-todo" id="widget-todo-{{.ID}}">
  <h3 class="widget-title">{{.Name}}</h3>
  {{range .Todos}}
  <div class="todo-item{{if .Done}} done{{end}}">
    <button class="todo-check" title="{{if .Done}}Erledigt{{else}}Offen{{end}}"
      hx-post="/api/todos/{{.ID}}/toggle"
      hx-target="#widget-todo-{{$.ID}}"
      hx-swap="outerHTML">{{if .Done}}✅{{else}}⬜{{end}}</button>
    <span class="todo-text">{{.Text}}</span>
    {{if .DueDate}}<span class="todo-due">{{.DueDate}}</span>{{end}}
    <button class="btn-icon delete todo-del" title="Löschen"
      hx-delete="/api/todos/{{.ID}}"
      hx-target="#widget-todo-{{$.ID}}"
      hx-swap="outerHTML">🗑️</button>
  </div>
  {{end}}
  <form hx-post="/api/todos"
        hx-target="#widget-todo-{{.ID}}"
        hx-swap="outerHTML"
        hx-on::after-request="this.reset()"
        class="todo-add-form">
    <input type="hidden" name="widget_id" value="{{.ID}}">
    <input type="text" name="text" placeholder="Neue Aufgabe…" class="todo-input" autocomplete="off">
    <button type="submit" class="btn-sm">+</button>
  </form>
</div>
{{end}}
