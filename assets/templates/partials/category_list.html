{{define "category_list"}}
<div class="category-list" id="sortable-categories">
    {{range .Categories}}
    {{$catID := .ID}}
    <div class="manage-category" id="cat-{{.ID}}" data-id="{{.ID}}">
        <div class="manage-header">
            <span class="drag-handle" title="Ziehen zum Sortieren">⠿</span>
            <span class="category-title" style="color: var(--{{.Color}})">{{.Name}} ({{.Layout}})</span>
            <div class="actions">
                <button class="btn-icon" hx-post="/manage/sort/category/{{.ID}}/up" hx-target="#category-list" hx-swap="innerHTML">⬆️</button>
                <button class="btn-icon" hx-post="/manage/sort/category/{{.ID}}/down" hx-target="#category-list" hx-swap="innerHTML">⬇️</button>
                <button class="btn-icon {{if eq .ColSpan 1}}span-active{{end}}" title="Volle Breite"
                    hx-post="/manage/category/{{.ID}}/span/1" hx-target="#category-list" hx-swap="innerHTML">▦</button>
                <button class="btn-icon {{if eq .ColSpan 2}}span-active{{end}}" title="Halbe Breite"
                    hx-post="/manage/category/{{.ID}}/span/2" hx-target="#category-list" hx-swap="innerHTML">▥</button>
                <button class="btn-icon {{if eq .ColSpan 3}}span-active{{end}}" title="Drittel"
                    hx-post="/manage/category/{{.ID}}/span/3" hx-target="#category-list" hx-swap="innerHTML">▤</button>
                <button class="btn-icon {{if eq .SortMode "usage"}}span-active{{end}}" title="Nach Nutzung sortieren"
                    hx-post="/manage/category/{{.ID}}/sortmode/{{if eq .SortMode "usage"}}manual{{else}}usage{{end}}"
                    hx-target="#category-list" hx-swap="innerHTML">📊</button>
                <button class="btn-icon"
                    hx-get="/manage/category/{{.ID}}/edit"
                    hx-target="#cat-edit-{{.ID}}"
                    hx-swap="innerHTML">✏️</button>
                <button class="btn-icon delete" hx-delete="/manage/category/{{.ID}}" hx-confirm="{{$.T "common.confirm_delete"}}" hx-target="#category-list" hx-swap="innerHTML">🗑️</button>
            </div>
        </div>
        <div id="cat-edit-{{.ID}}"></div>
        <div class="manage-service-list sortable-services" data-cat="{{$catID}}">
            {{range .Services}}
            <div class="manage-service-item" id="svc-row-{{.ID}}" data-id="{{.ID}}">
                <span class="drag-handle" title="Ziehen zum Sortieren">⠿</span>
                <div class="service-info">
                    <strong>{{.Name}}</strong>
                    <span class="text-muted"> - {{.URL}}</span>
                    {{range .VisibleTo}}
                    <span class="tag">{{.}}</span>
                    {{end}}
                </div>
                <div class="actions">
                    <button class="btn-icon" hx-post="/manage/sort/service/{{.ID}}/up" hx-target="#category-list" hx-swap="innerHTML">⬆️</button>
                    <button class="btn-icon" hx-post="/manage/sort/service/{{.ID}}/down" hx-target="#category-list" hx-swap="innerHTML">⬇️</button>
                    <button class="btn-icon"
                        hx-get="/manage/service/{{.ID}}/edit"
                        hx-target="#svc-edit-{{.ID}}"
                        hx-swap="innerHTML">✏️</button>
                    <button class="btn-icon delete" hx-delete="/manage/service/{{.ID}}" hx-confirm="{{$.T "common.confirm_delete"}}" hx-target="#category-list" hx-swap="innerHTML">🗑️</button>
                </div>
                <div id="svc-edit-{{.ID}}"></div>
            </div>
            {{end}}
        </div>
    </div>
    {{end}}
</div>
<script>
(function() {
  function initSortable() {
    var catList = document.getElementById('sortable-categories');
    if (!catList || typeof Sortable === 'undefined') return;

    Sortable.create(catList, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: function() {
        var items = catList.querySelectorAll('.manage-category[data-id]');
        var payload = Array.from(items).map(function(el, idx) {
          return {id: parseInt(el.dataset.id), sort_order: idx};
        });
        fetch('/manage/sort/category/reorder', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken()},
          body: JSON.stringify(payload)
        });
      }
    });

    catList.querySelectorAll('.sortable-services').forEach(function(svcList) {
      Sortable.create(svcList, {
        handle: '.drag-handle',
        animation: 150,
        onEnd: function() {
          var items = svcList.querySelectorAll('.manage-service-item[data-id]');
          var payload = Array.from(items).map(function(el, idx) {
            return {id: parseInt(el.dataset.id), sort_order: idx};
          });
          fetch('/manage/sort/service/reorder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken()},
            body: JSON.stringify(payload)
          });
        }
      });
    });
  }

  function getCsrfToken() {
    var m = document.cookie.match('(^|;)\\s*hp_csrf\\s*=\\s*([^;]+)');
    return m ? m.pop() : '';
  }

  initSortable();
  // Re-init after HTMX swaps category-list
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail && e.detail.target && e.detail.target.id === 'category-list') {
      initSortable();
    }
  });
})();
</script>
{{end}}

{{define "service_edit_form"}}
<form class="edit-form"
      hx-patch="/manage/service/{{.Service.ID}}"
      hx-target="#category-list"
      hx-swap="innerHTML">
    <div class="edit-form-grid">
        <div class="form-group">
            <label>{{.T "manage.name"}}</label>
            <input type="text" name="name" value="{{.Service.Name}}" required>
        </div>
        <div class="form-group">
            <label>{{.T "manage.url"}}</label>
            <input type="url" name="url" value="{{.Service.URL}}" required>
        </div>
        <div class="form-group">
            <label>{{.T "manage.icon"}}</label>
            <div style="display:flex;gap:0.4rem;align-items:center">
                <input type="text" name="icon" id="edit-icon-{{.Service.ID}}" value="{{.Service.Icon}}" placeholder="🏠 oder leer">
                <button type="button" class="btn-sm" onclick="fetchFaviconEdit({{.Service.ID}})" title="Favicon laden">🌐</button>
                <img id="edit-favicon-preview-{{.Service.ID}}" src="{{if .Service.Icon}}{{.Service.Icon}}{{end}}"
                    alt="" style="width:20px;height:20px;{{if not .Service.Icon}}display:none{{end}};border-radius:3px">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" name="description" value="{{.Service.Description}}">
        </div>
        <div class="form-group">
            <label>Status Check URL</label>
            <input type="url" name="status_check" value="{{.Service.StatusCheck}}">
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer">
                <input type="checkbox" name="no_check" value="1" {{if .Service.NoCheck}}checked{{end}}> {{.T "manage.no_check"}}
            </label>
        </div>
        <div class="form-group">
            <label>{{.T "manage.category"}}</label>
            <select name="category_id">
                {{range .Categories}}
                <option value="{{.ID}}" {{if eq .ID $.Service.CategoryID}}selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div class="form-group">
            <label>{{.T "manage.profile"}}</label>
            <select name="visibility" multiple size="{{len .Profiles}}">
                {{range .Profiles}}{{$slug := .Slug}}
                <option value="{{.Slug}}" {{range $.Service.VisibleTo}}{{if eq . $slug}}selected{{end}}{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </div>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
        <button type="submit" class="btn-sm">{{.T "manage.save"}}</button>
        <button type="button" class="btn-sm" onclick="document.getElementById('svc-edit-{{.Service.ID}}').innerHTML=''">{{.T "manage.cancel"}}</button>
    </div>
</form>
{{end}}

{{define "category_edit_form"}}
<form class="edit-form"
      hx-patch="/manage/category/{{.Category.ID}}"
      hx-target="#category-list"
      hx-swap="innerHTML">
    <div class="edit-form-grid">
        <div class="form-group">
            <label>{{.T "manage.name"}}</label>
            <input type="text" name="name" value="{{.Category.Name}}" required>
        </div>
        <div class="form-group">
            <label>Layout</label>
            <select name="layout">
                <option value="tiles" {{if eq .Category.Layout "tiles"}}selected{{end}}>Tiles</option>
                <option value="list" {{if eq .Category.Layout "list"}}selected{{end}}>List</option>
                <option value="icons" {{if eq .Category.Layout "icons"}}selected{{end}}>Icons</option>
            </select>
        </div>
        <div class="form-group">
            <label>Color</label>
            <select name="color">
                <option value="indigo" {{if eq .Category.Color "indigo"}}selected{{end}}>Indigo</option>
                <option value="blue" {{if eq .Category.Color "blue"}}selected{{end}}>Blue</option>
                <option value="cyan" {{if eq .Category.Color "cyan"}}selected{{end}}>Cyan</option>
                <option value="green" {{if eq .Category.Color "green"}}selected{{end}}>Green</option>
                <option value="yellow" {{if eq .Category.Color "yellow"}}selected{{end}}>Yellow</option>
                <option value="orange" {{if eq .Category.Color "orange"}}selected{{end}}>Orange</option>
                <option value="red" {{if eq .Category.Color "red"}}selected{{end}}>Red</option>
                <option value="purple" {{if eq .Category.Color "purple"}}selected{{end}}>Purple</option>
                <option value="gray" {{if eq .Category.Color "gray"}}selected{{end}}>Gray</option>
            </select>
        </div>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
        <button type="submit" class="btn-sm">{{.T "manage.save"}}</button>
        <button type="button" class="btn-sm" onclick="document.getElementById('cat-edit-{{.Category.ID}}').innerHTML=''">{{.T "manage.cancel"}}</button>
    </div>
</form>
{{end}}
