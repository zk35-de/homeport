<!DOCTYPE html>
<html lang="{{if .Prefs}}{{.Prefs.Language}}{{else}}de{{end}}" class="app-homeport" data-theme="{{if .Prefs}}{{.Prefs.Theme}}{{else}}dark{{end}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .ProfileName}}{{.ProfileName}} – {{end}}homeport</title>
    <link rel="stylesheet" href="/static/css/prism.css?v={{assetVer}}">
    <link rel="stylesheet" href="/static/style.css?v={{assetVer}}">
    <script src="/static/js/prism.js?v={{assetVer}}" defer></script>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    {{if and .Prefs .Profile}}
    <link id="user-theme" rel="stylesheet" href="/api/profile/{{.Profile}}/theme.css?v={{assetVer}}">
    {{end}}
    <script src="/static/htmx.min.js?v={{assetVer}}"></script>
    <script src="/static/sse.js?v={{assetVer}}"></script>
    <script src="/static/sortable.min.js?v={{assetVer}}"></script>
    <script src="/static/js/app.js?v={{assetVer}}" defer></script>
</head>
<body data-profile="{{if .Profile}}{{.Profile}}{{end}}" data-bg="{{if .Prefs}}{{.Prefs.BackgroundMode}}{{else}}aurora{{end}}">
    <div class="aurora" id="bg-aurora">
        <div class="ab ab-1"></div><div class="ab ab-2"></div><div class="ab ab-3"></div>
    </div>

    <div class="htmx-loading-bar" id="htmx-loading-bar"></div>
    <nav>
        <a href="/" class="brand">homeport</a>
        <span class="brand-sep">·</span>
        {{range .Profiles}}
        <a href="{{if .IsDefault}}/{{else}}/{{.Slug}}{{end}}">{{.Name}}</a>
        {{end}}
        <a href="/manage" class="nav-action">{{.T "nav.manage"}}</a>
        <button class="btn-icon nav-lang-toggle" title="{{.T "manage.language_toggle"}}" aria-label="{{.T "manage.language_toggle"}}" data-lang="{{if .Prefs}}{{.Prefs.Language}}{{else}}de{{end}}">DE</button>
        <button class="btn-icon nav-theme-toggle" title="{{.T "manage.theme_toggle"}}" aria-label="{{.T "manage.theme_toggle"}}">🌙</button>
        {{if .Profile}}<form method="post" action="/logout" class="nav-logout-form"><button class="btn-icon" title="{{.T "nav.logout"}}" aria-label="{{.T "nav.logout"}}">⎋</button></form>{{end}}
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>


</body>
</html>
