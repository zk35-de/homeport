<!DOCTYPE html>
<html lang="de" class="app-homeport" data-theme="{{if .Prefs}}{{.Prefs.Theme}}{{else}}dark{{end}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeport</title>
    <script>
      // No-flash: override data-theme from localStorage before first paint
      (function(){
        var t = localStorage.getItem('hp-theme');
        if (t === 'dark' || t === 'light' || t === 'system') {
          document.documentElement.dataset.theme = t === 'system' ? '' : t;
          if (t === 'system') delete document.documentElement.dataset.theme;
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/css/prism-tokens.css">
    <link rel="stylesheet" href="/static/css/prism-base.css">
    <link rel="stylesheet" href="/static/css/prism-aurora.css">
    <link rel="stylesheet" href="/static/css/prism-components.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    {{if .Prefs}}
    <style id="user-theme">
      {{if .Prefs.AccentColor}}
      :root { --accent: {{.Prefs.AccentColor}}; --accent-rgb: {{hexToRGB .Prefs.AccentColor}}; --accent-hover: {{.Prefs.AccentColor}}; }
      {{end}}
      {{if .Prefs.CustomCSS}}{{.Prefs.CustomCSS}}{{end}}
    </style>
    {{end}}
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
    <script>
    // Clock widget runtime
    (function() {
      function pad(n) { return String(n).padStart(2, '0'); }

      function formatDate(d, tz) {
        return d.toLocaleDateString('de-DE', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: tz
        });
      }

      function tickClock(el) {
        const mode = el.dataset.mode || 'digital';
        const tz   = el.dataset.timezone || 'Europe/Berlin';
        const showDate = el.dataset.showDate !== 'false';
        const showSec  = el.dataset.showSeconds !== 'false';
        const now = new Date();

        const dateEl = el.querySelector('[id^="clock-date-"]');

        if (mode === 'analog') {
          const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
          const ha = (h * 30) + (m * 0.5), ma = m * 6, sa = s * 6;
          const hourLine   = el.querySelector('.clock-hour');
          const minuteLine = el.querySelector('.clock-minute');
          const secondLine = el.querySelector('.clock-second');
          if (hourLine)   setHand(hourLine, ha, 28);
          if (minuteLine) setHand(minuteLine, ma, 35);
          if (secondLine) setHand(secondLine, sa, 38);
          if (dateEl && showDate) dateEl.textContent = formatDate(now, tz);
          return;
        }

        if (mode === 'countdown') {
          const target = el.dataset.countdown;
          const digitalEl = el.querySelector('[id^="clock-digital-"]');
          const labelEl   = el.querySelector('[id^="clock-label-"]');
          if (target && digitalEl) {
            const diff = new Date(target + 'T00:00:00') - now;
            if (diff > 0) {
              const days = Math.floor(diff / 86400000);
              const hrs  = Math.floor((diff % 86400000) / 3600000);
              const mins = Math.floor((diff % 3600000) / 60000);
              const secs = Math.floor((diff % 60000) / 1000);
              digitalEl.textContent = days + 'd ' + pad(hrs) + ':' + pad(mins) + ':' + pad(secs);
            } else {
              digitalEl.textContent = '00d 00:00:00';
            }
          }
          if (labelEl && target) labelEl.textContent = 'bis ' + new Date(target).toLocaleDateString('de-DE');
          return;
        }

        // digital
        const digitalEl = el.querySelector('[id^="clock-digital-"]');
        if (digitalEl) {
          const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());
          digitalEl.textContent = showSec ? h + ':' + m + ':' + s : h + ':' + m;
        }
        if (dateEl && showDate) dateEl.textContent = formatDate(now, tz);
      }

      function setHand(line, angle, length) {
        const rad = (angle - 90) * Math.PI / 180;
        const x2 = 50 + length * Math.cos(rad);
        const y2 = 50 + length * Math.sin(rad);
        line.setAttribute('x2', x2.toFixed(2));
        line.setAttribute('y2', y2.toFixed(2));
      }

      function initClocks() {
        document.querySelectorAll('.widget-clock').forEach(el => {
          tickClock(el);
          setInterval(() => tickClock(el), 1000);
        });
      }

      document.addEventListener('DOMContentLoaded', initClocks);
    })();

    // Theme toggle (nav button)
    function cycleTheme() {
      var cur = localStorage.getItem('hp-theme') || 'dark';
      var next = cur === 'dark' ? 'light' : cur === 'light' ? 'system' : 'dark';
      if (next === 'system') {
        delete document.documentElement.dataset.theme;
      } else {
        document.documentElement.dataset.theme = next;
      }
      localStorage.setItem('hp-theme', next);
      var icons = {'dark':'🌙','light':'☀️','system':'💻'};
      document.querySelectorAll('.nav-theme-toggle').forEach(b => b.textContent = icons[next]);
      try {
        fetch('/api/user/preferences', {
          method:'PATCH', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({theme: next})
        });
      } catch(e) {}
    }
    // Init nav toggle icon
    document.addEventListener('DOMContentLoaded', function() {
      var t = localStorage.getItem('hp-theme') || 'dark';
      var icons = {'dark':'🌙','light':'☀️','system':'💻'};
      document.querySelectorAll('.nav-theme-toggle').forEach(b => b.textContent = icons[t] || '🌙');
    });

    // manage.html widget form toggle
    function updateWidgetForm() {
      const sel = document.getElementById('widget-type-select');
      if (!sel) return;
      const ical  = document.getElementById('widget-ical-fields');
      const clock = document.getElementById('widget-clock-fields');
      if (ical)  ical.style.display  = sel.value === 'ical'  ? '' : 'none';
      if (clock) clock.style.display = sel.value === 'clock' ? '' : 'none';
      const modeEl = document.querySelector('select[name="clock_mode"]');
      if (modeEl) updateClockMode(modeEl);
    }
    function updateClockMode(sel) {
      const cg = document.getElementById('clock-countdown-group');
      if (cg) cg.style.display = sel && sel.value === 'countdown' ? '' : 'none';
    }
    </script>
</head>
<body>
    <div class="aurora">
        <div class="ab ab-1"></div>
        <div class="ab ab-2"></div>
        <div class="ab ab-3"></div>
    </div>
    <nav>
        <a href="/" class="brand">homeport</a>
        <span class="brand-sep">·</span>
        <a href="/">Markus</a>
        <a href="/andrea">Andrea</a>
        <a href="/manage" class="nav-action">Manage</a>
        <button class="btn-icon" onclick="openPalette()" title="Command Palette (Ctrl+K)">⌘</button>
        <button class="btn-icon nav-theme-toggle" onclick="cycleTheme()" title="Theme wechseln">🌙</button>
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>

    <!-- Command Palette -->
    <div id="cmd-backdrop" class="cmd-backdrop hidden" onclick="closePalette()"></div>
    <div id="cmd-palette" class="cmd-palette hidden" role="dialog" aria-modal="true" aria-label="Command Palette">
        <div class="cmd-header">
            <input id="cmd-input" type="text" placeholder="Suchen oder Befehl eingeben…" autocomplete="off" spellcheck="false">
            <kbd class="cmd-esc">Esc</kbd>
        </div>
        <ul id="cmd-results" class="cmd-results"></ul>
        <div class="cmd-footer">
            <span>↑↓ navigieren</span><span>↵ öffnen</span><span>Esc schließen</span>
        </div>
    </div>

    <!-- Cmd+K button in nav (kleine Abkürzung) -->
    <script>
    (function(){
      // Static commands (always available)
      const STATIC_CMDS = [
        { label: '🏠 Markus Dashboard',    url: '/',        group: 'Navigation' },
        { label: '👩 Andrea Dashboard',    url: '/andrea',  group: 'Navigation' },
        { label: '⚙️ Manage',             url: '/manage',  group: 'Navigation' },
        { label: '🌙 Theme wechseln',      action: 'theme', group: 'Aktionen'  },
        { label: '💾 Backup herunterladen',url: '/manage/backup', group: 'Aktionen' },
      ];

      let allCmds = [];
      let activeIdx = -1;

      function buildCommands() {
        allCmds = [...STATIC_CMDS];
        // Collect service cards from DOM
        document.querySelectorAll('.service-card').forEach(a => {
          const name = a.querySelector('.service-name')?.textContent?.trim();
          const url  = a.href;
          const icon = a.querySelector('.service-icon')?.textContent?.trim() || '🔗';
          if (name && url) {
            allCmds.push({ label: icon + ' ' + name, url, group: 'Services' });
          }
        });
      }

      function fuzzy(str, query) {
        str = str.toLowerCase();
        query = query.toLowerCase();
        if (!query) return true;
        let si = 0;
        for (let qi = 0; qi < query.length; qi++) {
          si = str.indexOf(query[qi], si);
          if (si === -1) return false;
          si++;
        }
        return true;
      }

      function renderResults(query) {
        const ul = document.getElementById('cmd-results');
        const filtered = allCmds.filter(c => fuzzy(c.label, query));
        ul.innerHTML = '';
        activeIdx = filtered.length ? 0 : -1;
        let lastGroup = null;
        filtered.slice(0, 12).forEach((cmd, i) => {
          if (cmd.group !== lastGroup) {
            const sep = document.createElement('li');
            sep.className = 'cmd-group';
            sep.textContent = cmd.group;
            ul.appendChild(sep);
            lastGroup = cmd.group;
          }
          const li = document.createElement('li');
          li.className = 'cmd-item' + (i === 0 ? ' active' : '');
          li.textContent = cmd.label;
          li.dataset.idx = i;
          li.addEventListener('click', () => execCmd(cmd));
          li.addEventListener('mouseenter', () => setActive(i));
          ul.appendChild(li);
        });
        window._cmdFiltered = filtered.slice(0, 12);
      }

      function setActive(idx) {
        activeIdx = idx;
        document.querySelectorAll('#cmd-results .cmd-item').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
          if (i === idx) el.scrollIntoView({ block: 'nearest' });
        });
      }

      function execCmd(cmd) {
        closePalette();
        if (cmd.action === 'theme') { cycleTheme(); return; }
        if (cmd.url) window.location.href = cmd.url;
      }

      function openPalette() {
        buildCommands();
        document.getElementById('cmd-palette').classList.remove('hidden');
        document.getElementById('cmd-backdrop').classList.remove('hidden');
        const inp = document.getElementById('cmd-input');
        inp.value = '';
        renderResults('');
        inp.focus();
      }

      function closePalette() {
        document.getElementById('cmd-palette').classList.add('hidden');
        document.getElementById('cmd-backdrop').classList.add('hidden');
      }

      // Expose globals
      window.openPalette  = openPalette;
      window.closePalette = closePalette;

      document.addEventListener('keydown', function(e) {
        const pal = document.getElementById('cmd-palette');
        const open = !pal.classList.contains('hidden');

        // Open: Cmd/Ctrl+K or '/' when not in input
        if (!open && (e.key === 'k' && (e.metaKey || e.ctrlKey))) {
          e.preventDefault(); openPalette(); return;
        }
        if (!open && e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault(); openPalette(); return;
        }
        if (!open) return;

        if (e.key === 'Escape') { closePalette(); return; }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setActive(Math.min(activeIdx + 1, (window._cmdFiltered?.length || 1) - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActive(Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const cmd = window._cmdFiltered?.[activeIdx];
          if (cmd) execCmd(cmd);
        }
      });

      document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('cmd-input')?.addEventListener('input', function() {
          renderResults(this.value);
          activeIdx = 0;
        });
      });
    })();
    </script>
</body>
</html>
