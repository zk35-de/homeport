<!DOCTYPE html>
<html lang="de" class="app-homeport" data-theme="{{if .Prefs}}{{.Prefs.Theme}}{{else}}dark{{end}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .ProfileName}}{{.ProfileName}} – {{end}}homeport</title>
    <link rel="stylesheet" href="/static/css/prism-tokens.css">
    <link rel="stylesheet" href="/static/css/prism-base.css">
    <link rel="stylesheet" href="/static/css/prism-components.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    {{if and .Prefs .Profile}}
    <link id="user-theme" rel="stylesheet" href="/api/profile/{{.Profile}}/theme.css">
    {{end}}
    <script src="/static/htmx.min.js"></script>
    <script src="/static/sse.js"></script>
    <script src="/static/sortable.min.js"></script>
    <script src="/static/js/app.js" defer></script>
</head>
<body data-profile="{{if .Profile}}{{.Profile}}{{end}}">




    <div class="htmx-loading-bar" id="htmx-loading-bar"></div>
    <nav>
        <a href="/" class="brand">homeport</a>
        <span class="brand-sep">·</span>
        {{range .Profiles}}
        <a href="{{if .IsDefault}}/{{else}}/{{.Slug}}{{end}}">{{.Name}}</a>
        {{end}}
        <a href="/manage" class="nav-action">{{.T "nav.manage"}}</a>
        <button class="btn-icon nav-theme-toggle" title="Theme wechseln" aria-label="Theme wechseln">🌙</button>
        {{if .Profile}}<form method="post" action="/logout" style="display:inline"><button class="btn-icon" title="{{.T "nav.logout"}}" aria-label="{{.T "nav.logout"}}">⎋</button></form>{{end}}
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>


</body>
</html>
