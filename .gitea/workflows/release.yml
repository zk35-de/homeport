name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test before release
        run: go test ./...

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/homeport-linux-amd64 ./cmd/homeport

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/homeport-linux-arm64 ./cmd/homeport

      - name: Checksums
        run: |
          cd dist
          sha256sum homeport-linux-amd64 homeport-linux-arm64 > checksums.txt

      - name: Create Release
        uses: forgejo/release-action@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            dist/homeport-linux-amd64
            dist/homeport-linux-arm64
            dist/checksums.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.zk35.de
          username: secalpha
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            git.zk35.de/secalpha/homeport:${{ github.ref_name }}
            git.zk35.de/secalpha/homeport:latest
