name: Release & Publish Container

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: "15 3 * * 1"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Download dependencies
        run: go mod download

      - name: Test before release
        run: go test ./...

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare dist directory
        if: startsWith(github.ref, 'refs/tags/v')
        run: mkdir -p dist

      - name: Build linux/amd64
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags="-s -w -X 'github.com/zk35-de/homeport/internal/api.AppVersion=${{ github.ref_name }}'" \
            -o dist/homeport-linux-amd64 ./cmd/homeport

      - name: Build linux/arm64
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags="-s -w -X 'github.com/zk35-de/homeport/internal/api.AppVersion=${{ github.ref_name }}'" \
            -o dist/homeport-linux-arm64 ./cmd/homeport

      - name: Checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist
          sha256sum homeport-linux-amd64 homeport-linux-arm64 > checksums.txt

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
          GITEA_URL: https://git.zk35.de
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST "${GITEA_URL}/api/v1/repos/${REPO}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"draft\":false,\"prerelease\":false}" \
            -o /tmp/release.json
          RELEASE_ID=$(python3 -c "import json,sys; print(json.load(open('/tmp/release.json'))['id'])")
          for f in dist/homeport-linux-amd64 dist/homeport-linux-arm64 dist/checksums.txt; do
            curl -s -X POST "${GITEA_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=$(basename $f)" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${f}"
          done

      - name: Build and push container image
        env:
          REGISTRY: git.zk35.de
          IMAGE: git.zk35.de/secalpha/homeport
          TAG: ${{ steps.version.outputs.value }}
          GITEA_TOKEN: ${{ secrets.HOMEPORTCI }}
        run: |
          podman login ${REGISTRY} -u secalpha -p ${GITEA_TOKEN}
          podman build --no-cache --build-arg VERSION=${TAG} -f Containerfile -t ${IMAGE}:${TAG} -t ${IMAGE}:latest .
          if [[ "${TAG}" != "latest" ]]; then
            podman push ${IMAGE}:${TAG}
          fi
          podman push ${IMAGE}:latest