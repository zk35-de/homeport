# Starten:
#   docker compose up -d
# oder podman:
#   podman compose up -d
#
# Bei Bind-Mount (device: /your/path) Verzeichnis vorher anlegen:
#   mkdir -p /your/path && chown 1000:1000 /your/path
# Der Container läuft als uid 1000 (non-root).

services:
  homeport:
    image: ghcr.io/zk35-de/homeport:latest
    ports:
      # Alle Interfaces (Standard):
      - "8855:8855"
      # Dedizierte IP (z.B. nur im Heimnetz erreichbar):
      # - "192.168.1.10:8855:8855"
    volumes:
      - homeport-data:/app/data
    environment:
      - HOMEPORT_PORT=8855
      - HOMEPORT_DB=/app/data/homeport.db
      # - HOMEPORT_AUTH=true
      # - HOMEPORT_PUBLIC_PROFILE=public
      # - HOMEPORT_BACKUP_INTERVAL=24h
      # - HOMEPORT_BACKUP_MAX_KEEP=7
    restart: unless-stopped
    # Macvlan: Container bekommt eigene IP im Heimnetz (ports-Abschnitt dann weglassen)
    # networks:
    #   macvlan:
    #     ipv4_address: 192.168.1.10

volumes:
  homeport-data:
    # Bind-Mount statt named volume (optional):
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /opt/homeport/data

# Macvlan-Netzwerk (optional – Container erhält eigene IP im Heimnetz)
# Voraussetzung: macvlan-Netzwerk einmalig anlegen:
#   docker network create -d macvlan \
#     --subnet=192.168.1.0/24 \
#     --gateway=192.168.1.1 \
#     -o parent=eth0 \
#     macvlan
# networks:
#   macvlan:
#     external: true
