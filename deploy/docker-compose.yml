# Registry-Login (einmalig):
#   docker login git.zk35.de
#   podman login git.zk35.de
#
# Starten:
#   HOMEPORT_TOKEN=your-secret docker compose up -d
# oder .env-Datei anlegen:
#   echo "HOMEPORT_TOKEN=your-secret" > .env

services:
  homeport:
    image: git.zk35.de/secalpha/homeport:latest
    ports:
      - "8855:8855"
    volumes:
      - homeport-data:/app/data
    environment:
      - HOMEPORT_PORT=8855
      - HOMEPORT_DB=/app/data/homeport.db
      - HOMEPORT_TOKEN=${HOMEPORT_TOKEN}
      # - HOMEPORT_AUTH=true
      # - HOMEPORT_PUBLIC_PROFILE=public
      # - HOMEPORT_BACKUP_INTERVAL=24h
      # - HOMEPORT_BACKUP_MAX_KEEP=7
      # - HOMEPORT_CORS=https://homeport.example.com
      # - HOMEPORT_TRUSTED_PROXIES=172.16.0.0/12
    restart: unless-stopped

volumes:
  homeport-data:
