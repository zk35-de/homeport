# Starten:
#   docker compose up -d
# oder podman:
#   podman compose up -d

services:
  homeport:
    image: git.zk35.de/secalpha/homeport:latest
    ports:
      # Alle Interfaces (Standard):
      - "8855:8855"
      # Dedizierte IP (z.B. nur im Heimnetz erreichbar):
      # - "192.168.1.10:8855:8855"
    volumes:
      - homeport-data:/app/data
    environment:
      - HOMEPORT_PORT=8855
      - HOMEPORT_DB=/app/data/homeport.db
      # - HOMEPORT_AUTH=true
      # - HOMEPORT_PUBLIC_PROFILE=public
      # - HOMEPORT_BACKUP_INTERVAL=24h
      # - HOMEPORT_BACKUP_MAX_KEEP=7
      # - HOMEPORT_CORS=https://homeport.example.com
      # - HOMEPORT_TRUSTED_PROXIES=172.16.0.0/12
    restart: unless-stopped

volumes:
  homeport-data:
